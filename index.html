<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Move · 90">
<meta name="theme-color" content="#0a0f1a">
<title>Move · 90 — Strength & Mobility</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0f1a;
  --surface:  #0f1624;
  --card:     #131d2e;
  --card2:    #172033;
  --border:   rgba(255,255,255,0.07);
  --white:    #eef0ec;
  --muted:    rgba(238,240,236,0.4);
  --navy:     #1e3a5f;
  --sage:     #7aad8a;
  --sage2:    #5a9470;
  --sage-dim: rgba(122,173,138,0.15);
  --rose:     #c97b7b;
  --gold:     #c9a96e;
  --lavender: #8fa8cc;
  --teal:     #4db8a8;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bot: env(safe-area-inset-bottom, 34px);
/* Font-size scale — generated from Typography.swift */
  --fs-display: 72px;
  --fs-title: 28px;
  --fs-headline: 24px;
  --fs-callout: 20px;
  --fs-body: 19px;
  --fs-subhead: 18px;
  --fs-caption: 17px;
  --fs-micro: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; }
html,body { height:100%; overflow:hidden; background:var(--bg); color:var(--white); font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
#app { display:flex; flex-direction:column; height:100dvh; }

/* ── HEADER ── */
.app-header {
  padding: calc(var(--safe-top) + 8px) 18px 12px;
  background: linear-gradient(180deg, #0d1525 0%, transparent 100%);
  flex-shrink:0; z-index:20;
  border-bottom: 1px solid var(--border);
}
.header-row1 { display:flex; align-items:center; justify-content:space-between; margin-bottom:3px; }
.app-title { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; letter-spacing:.02em; text-transform:uppercase; }
.app-title span { color:var(--sage); }
.header-badges { display:flex; gap:6px; align-items:center; }
.badge { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.06em; padding:4px 10px; border-radius:20px; }
.badge-day { background:var(--sage); color:#0a0f1a; }
.badge-program { background:rgba(143,168,204,.2); color:var(--lavender); border:1px solid rgba(143,168,204,.3); }
.header-row2 { display:flex; align-items:center; justify-content:space-between; }
.phase-strip { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; color:var(--muted); }
.morning-tag { font-size:12px; color:var(--sage); font-weight:600; }

/* ── NAV ── */
.nav-tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:15; }
.nav-tab { flex:1; padding:10px 4px; text-align:center; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); cursor:pointer; border:none; background:none; border-bottom:2px solid transparent; transition:color .2s,border-color .2s; }
.nav-tab.active { color:var(--sage); border-bottom-color:var(--sage); }
.nav-tab-icon { font-size:15px; display:block; margin-bottom:2px; }

.scroll-view { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; }
.scroll-view::-webkit-scrollbar { display:none; }
.screen { display:none; }
.screen.active { display:block; }

/* ── TODAY ── */
.today-screen { padding-bottom:calc(var(--safe-bot) + 24px); }

.day-nav { display:flex; align-items:center; padding:10px 16px; gap:10px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--bg); z-index:10; }
.day-nav-btn { width:34px; height:34px; border-radius:50%; border:1px solid var(--border); background:var(--surface); color:var(--white); font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.day-nav-center { flex:1; text-align:center; }
.day-nav-label { font-family:'Syne',sans-serif; font-weight:700; font-size:17px; letter-spacing:.03em; }
.day-nav-date { font-size:12px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }

/* MORNING RITUAL BANNER */
.morning-banner {
  margin:14px 14px 0;
  background:linear-gradient(135deg,rgba(122,173,138,.12),rgba(143,168,204,.08));
  border:1px solid rgba(122,173,138,.25);
  border-radius:14px;
  padding:13px 15px;
}
.morning-banner-title { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; color:var(--sage); margin-bottom:8px; }
.morning-items { display:flex; flex-direction:column; gap:6px; }
.morning-item { display:flex; align-items:center; gap:10px; }
.morning-item-check { width:22px; height:22px; border-radius:50%; border:2px solid rgba(122,173,138,.4); display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; cursor:pointer; transition:all .2s; background:transparent; }
.morning-item-check.done { background:var(--sage); border-color:var(--sage); color:#0a0f1a; }
.morning-item-text { font-size:14px; font-weight:500; }
.morning-item-sub { font-size:12px; color:var(--muted); margin-top:1px; }

/* DAY HERO */
.day-hero { padding:14px 14px 4px; display:flex; align-items:flex-end; gap:12px; margin-bottom:10px; }
.day-num-big { font-family:'DM Serif Display',serif; font-size:80px; font-weight:400; line-height:1; color:var(--sage); opacity:.1; flex-shrink:0; }
.day-phase-info { flex:1; padding-bottom:8px; }
.day-phase-name { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; margin-bottom:5px; }
.day-prog-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:5px; }
.day-prog-fill { height:100%; background:linear-gradient(90deg,var(--sage2),var(--sage)); border-radius:2px; transition:width .4s; }
.day-prog-lbl { font-size:12px; color:var(--muted); }

/* SECTION DIVIDERS */
.workout-section-head {
  padding:6px 14px 6px;
  font-family:'Syne',sans-serif;
  font-size:10px;
  font-weight:700;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:8px;
}
.workout-section-head::after { content:''; flex:1; height:1px; background:var(--border); }

/* WORKOUT CARDS */
.workouts-list { padding:0 14px; display:flex; flex-direction:column; gap:8px; }
.workout-card {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:13px;
  padding:13px 13px;
  display:flex;
  align-items:flex-start;
  gap:12px;
  cursor:pointer;
  transition:border-color .2s,background .2s;
  position:relative;
  overflow:hidden;
}
.workout-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--card-accent,var(--sage)); border-radius:3px 0 0 3px; }
.workout-card.done { border-color:rgba(122,173,138,.3); background:rgba(122,173,138,.06); }
.workout-card.done::before { background:var(--sage); }
.workout-check { width:26px; height:26px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:12px; transition:all .2s; background:var(--surface); margin-top:1px; }
.workout-card.done .workout-check { background:var(--sage); border-color:var(--sage); color:#0a0f1a; }
.workout-info { flex:1; min-width:0; }
.workout-type-label { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; margin-bottom:3px; }
.workout-name { font-family:'DM Serif Display',serif; font-size:17px; font-weight:400; line-height:1.25; margin-bottom:5px; }
.workout-meta { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.workout-dur { font-size:13px; color:var(--muted); background:var(--surface); padding:2px 8px; border-radius:8px; font-weight:600; }
.workout-instructor { font-size:13px; color:var(--muted); }
.workout-note { font-size:13px; color:var(--gold); margin-top:5px; line-height:1.45; font-weight:400; font-style:italic; }
.grip-badge { display:inline-flex; align-items:center; gap:4px; font-size:12px; background:rgba(201,169,110,.15); color:var(--gold); border-radius:5px; padding:3px 8px; font-weight:600; margin-top:4px; border:1px solid rgba(201,169,110,.25); }
.platform-link {
  display:inline-flex; align-items:center; gap:5px;
  margin-top:7px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:7px;
  padding:4px 10px;
  font-size:12px; font-weight:600;
  color:rgba(238,240,236,0.6);
  text-decoration:none;
  font-family:'DM Sans',sans-serif;
}
.platform-link:active { border-color:rgba(255,255,255,.25); color:var(--white); }

/* card type accents */
.type-pvolve     { --card-accent:var(--sage); color:var(--sage); }
.type-peloton    { --card-accent:var(--lavender); color:var(--lavender); }
.type-grip       { --card-accent:var(--gold); color:var(--gold); }
.type-meditation { --card-accent:var(--sage); color:var(--sage); }
.type-mobility { --card-accent:var(--teal); color:var(--teal); }
.type-selfcare { --card-accent:var(--rose); color:var(--rose); }
.type-stretch  { --card-accent:rgba(143,168,204,.8); color:var(--lavender); }

.complete-btn { margin:12px 14px 0; padding:14px; background:var(--sage); border:none; border-radius:13px; color:#0a0f1a; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; width:calc(100% - 28px); cursor:pointer; transition:opacity .2s,transform .1s; }
.complete-btn:active { transform:scale(.98); }
.complete-btn.all-done { background:var(--sage2); }

.day-notes { margin:10px 14px 0; background:var(--card); border:1px solid var(--border); border-radius:13px; overflow:hidden; }
.day-notes-header { padding:10px 14px; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border); }
.day-notes textarea { width:100%; background:transparent; border:none; outline:none; color:var(--white); font-family:'DM Sans',sans-serif; font-size:14px; line-height:1.5; padding:10px 14px; resize:none; min-height:70px; font-weight:300; }
.day-notes textarea::placeholder { color:var(--muted); }

.drink-row { margin:10px 14px 0; }
.drink-toggle { display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--border); border-radius:13px; padding:12px 14px; cursor:pointer; user-select:none; transition:border-color .2s,background .2s; }
.drink-toggle.drink-on { border-color:rgba(228,100,80,.4); background:rgba(228,100,80,.07); }
.drink-toggle-label { flex:1; font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); }
.drink-toggle.drink-on .drink-toggle-label { color:#e46450; }
.drink-badge { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.08em; padding:3px 9px; border-radius:6px; background:var(--surface); color:var(--muted); }
.drink-toggle.drink-on .drink-badge { background:rgba(228,100,80,.18); color:#e46450; }

.rest-day-card { margin:16px 14px; background:var(--card); border:1px solid var(--border); border-radius:16px; padding:36px 18px; text-align:center; }
.rest-day-card .rest-icon { font-size:40px; margin-bottom:10px; }
.rest-day-card h2 { font-family:'DM Serif Display',serif; font-size:28px; font-weight:400; margin-bottom:8px; }
.rest-day-card p { font-size:14px; color:var(--muted); line-height:1.6; }
.rest-note { margin-top:12px; padding:10px 14px; background:rgba(122,173,138,.1); border-radius:9px; font-size:13px; color:var(--sage); }

/* ── SCHEDULE ── */
.schedule-screen { padding-bottom:calc(var(--safe-bot) + 24px); }
.phase-head { padding:12px 14px 8px; position:sticky; top:0; z-index:5; background:var(--bg); }
.phase-head-inner { background:var(--surface); border-radius:10px; padding:9px 13px; display:flex; align-items:center; gap:8px; border:1px solid var(--border); }
.phase-head-tag { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.15em; text-transform:uppercase; padding:3px 8px; border-radius:4px; background:var(--sage); color:#0a0f1a; }
.phase-head-title { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; }
.phase-head-prog { margin-left:auto; font-size:13px; color:var(--muted); }
.week-section { margin:0 14px 6px; }
.week-label-s { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:6px 2px 5px; }
.sched-day-row { display:flex; align-items:center; gap:10px; padding:9px 12px; background:var(--card); border-radius:10px; margin-bottom:5px; cursor:pointer; border:1px solid var(--border); transition:border-color .15s; }
.sched-day-row:active { border-color:rgba(255,255,255,.15); }
.sched-day-row.today-row { border-color:var(--sage); }
.sched-day-row.completed-row { border-color:rgba(122,173,138,.25); }
.sched-day-row.rest-row { opacity:.4; }
.sched-day-num { font-family:'DM Serif Display',serif; font-size:20px; width:32px; text-align:center; flex-shrink:0; color:var(--muted); }
.sched-day-row.today-row .sched-day-num { color:var(--sage); }
.sched-day-row.completed-row .sched-day-num { color:var(--sage); opacity:.7; }
.sched-day-info { flex:1; min-width:0; }
.sched-day-name { font-size:14px; font-weight:500; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sched-day-chips { display:flex; gap:3px; flex-wrap:wrap; }
.chip { font-size:11px; font-family:'Syne',sans-serif; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:2px 6px; border-radius:4px; }
.chip-pvolve     { background:rgba(122,173,138,.15); color:var(--sage); }
.chip-peloton    { background:rgba(143,168,204,.15); color:var(--lavender); }
.chip-grip       { background:rgba(201,169,110,.15); color:var(--gold); }
.chip-meditation { background:rgba(96,180,140,.15);  color:var(--sage); }
.chip-mobility{ background:rgba(77,184,168,.15); color:var(--teal); }
.chip-selfcare{ background:rgba(201,123,123,.15); color:var(--rose); }
.chip-rest    { background:rgba(255,255,255,.05); color:var(--muted); }
.chip-stretch { background:rgba(143,168,204,.1); color:var(--lavender); }
.sched-day-status { font-size:15px; flex-shrink:0; }

/* Measurement row */
.measure-day-row {
  display:flex; align-items:center; gap:10px;
  padding:8px 12px;
  background:rgba(201,169,110,.07);
  border:1px solid rgba(201,169,110,.2);
  border-radius:10px; margin-bottom:5px;
  cursor:pointer;
}
.measure-day-icon { font-size:16px; flex-shrink:0; }
.measure-day-text { flex:1; }
.measure-day-title { font-size:13px; font-weight:600; color:var(--gold); }
.measure-day-sub { font-size:11px; color:var(--muted); margin-top:1px; }
.measure-day-done { font-size:14px; flex-shrink:0; }

/* ── PROGRESS ── */
.progress-screen { padding:14px 14px calc(var(--safe-bot) + 24px); }

.prog-hero { background:linear-gradient(135deg,var(--card) 0%,#0f1e30 100%); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:14px; }
.prog-top { display:flex; align-items:center; gap:16px; margin-bottom:14px; }
.prog-ring-wrap { position:relative; width:96px; height:96px; flex-shrink:0; }
.prog-ring-svg { transform:rotate(-90deg); }
.prog-ring-bg { fill:none; stroke:var(--border); stroke-width:7; }
.prog-ring-fill { fill:none; stroke:url(#sageGrad); stroke-width:7; stroke-linecap:round; transition:stroke-dashoffset .6s ease; }
.prog-ring-text { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.prog-pct { font-family:'DM Serif Display',serif; font-size:26px; line-height:1; color:var(--sage); }
.prog-pct-label { font-size:10px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; }
.prog-right { flex:1; }
.prog-hero-title { font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; margin-bottom:10px; }
.prog-stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.prog-stat { text-align:center; background:var(--surface); border-radius:8px; padding:8px 4px; }
.prog-stat-val { font-family:'DM Serif Display',serif; font-size:22px; line-height:1; margin-bottom:2px; }
.prog-stat-lbl { font-size:10px; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; }

/* GRIP CARD */
.section-head { font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; margin-top:16px; }

.grip-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
.grip-card-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; justify-content:space-between; }
.grip-hands { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.grip-hand { background:var(--surface); border-radius:10px; padding:12px; text-align:center; border:1px solid var(--border); }
.grip-hand-label { font-size:11px; color:var(--muted); font-weight:600; letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.grip-hand-val { font-family:'DM Serif Display',serif; font-size:28px; color:var(--gold); line-height:1; }
.grip-hand-unit { font-size:11px; color:var(--muted); margin-top:2px; }
.grip-note { font-size:13px; color:var(--muted); text-align:center; }

/* ROM CARD */
.rom-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; margin-bottom:12px; }
.rom-card-title { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--teal); margin-bottom:14px; }
.rom-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.rom-item { background:var(--surface); border-radius:9px; padding:11px 12px; border:1px solid var(--border); }
.rom-label { font-size:11px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px; }
.rom-val { font-family:'DM Serif Display',serif; font-size:22px; color:var(--teal); line-height:1.1; }
.rom-unit { font-size:11px; color:var(--muted); }
.rom-delta { font-size:11px; font-weight:700; margin-left:4px; }
.delta-pos { color:var(--sage); }
.delta-neg { color:var(--rose); }

/* MEASURE FORM */
.measure-form { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-bottom:14px; }
.measure-form-title { padding:13px 15px 10px; font-family:'Syne',sans-serif; font-size:14px; font-weight:700; letter-spacing:.06em; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.measure-week-label { font-size:12px; color:var(--gold); font-weight:600; }
.measure-week-select { background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--gold); font-family:'Syne',sans-serif; font-size:12px; font-weight:600; padding:3px 8px; }
.measure-grid { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); }
.measure-field { background:var(--card); padding:12px 14px; }
.measure-field label { display:block; font-size:11px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:4px; font-weight:600; }
.measure-field input { width:100%; background:transparent; border:none; outline:none; color:var(--white); font-family:'DM Serif Display',serif; font-size:22px; }
.measure-field input::placeholder { color:rgba(238,240,236,.15); }
.measure-unit { font-size:12px; color:var(--muted); margin-left:2px; font-family:'DM Sans',sans-serif; }
.measure-notes-field { background:var(--card); padding:12px 14px; grid-column:1/-1; border-top:1px solid var(--border); }
.measure-notes-field textarea { width:100%; background:transparent; border:none; outline:none; color:var(--white); font-family:'DM Sans',sans-serif; font-size:13px; line-height:1.5; resize:none; min-height:50px; }
.measure-notes-field textarea::placeholder { color:var(--muted); }
.measure-save-btn { width:100%; padding:14px; background:var(--sage); border:none; color:#0a0f1a; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; }
.measure-save-btn:active { opacity:.85; }

/* HISTORY TABLE */
.history-card { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; margin-top:4px; }
.history-row { display:grid; grid-template-columns:52px 1fr 1fr 1fr 1fr; gap:2px; padding:10px 12px; border-bottom:1px solid var(--border); font-size:13px; align-items:center; }
.history-row:last-child { border-bottom:none; }
.history-row.hdr { background:var(--surface); font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:8px 12px; }
.history-wk { font-family:'DM Serif Display',serif; font-size:16px; color:var(--gold); }
.history-val { font-weight:500; font-size:13px; }
.h-delta { font-size:11px; font-weight:700; }
.h-pos { color:var(--sage); }
.h-neg { color:var(--rose); }

/* HEATMAP */
.heatmap-row { display:flex; gap:3px; flex-wrap:nowrap; overflow-x:auto; padding-bottom:4px; }
.heatmap-week { display:flex; flex-direction:column; gap:3px; flex-shrink:0; }
.heatmap-cell { width:16px; height:16px; border-radius:3px; background:var(--card); border:1px solid var(--border); flex-shrink:0; }
.heatmap-cell.done-cell { background:var(--sage); border-color:var(--sage); opacity:.8; }
.heatmap-cell.rest-cell { background:rgba(255,255,255,.03); }
.heatmap-cell.today-cell { border-color:var(--gold); }
.heatmap-cell.drank-cell { outline:2px solid #39ff14; outline-offset:1px; }
.heatmap-labels { display:flex; gap:3px; margin-bottom:3px; }
.heatmap-wk-lbl { width:16px; text-align:center; font-size:8px; color:var(--muted); font-weight:700; flex-shrink:0; font-family:'Syne',sans-serif; }

.empty-history { padding:20px; text-align:center; color:var(--muted); font-size:14px; }

/* TOAST */
.toast { position:fixed; bottom:calc(var(--safe-bot) + 72px); left:50%; transform:translateX(-50%) translateY(16px); background:var(--sage); color:#0a0f1a; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; letter-spacing:.08em; padding:9px 18px; border-radius:20px; opacity:0; transition:all .25s; z-index:100; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.workout-card { animation:fadeUp .22s ease both; }
.workout-card:nth-child(2){animation-delay:.04s}
.workout-card:nth-child(3){animation-delay:.08s}
.workout-card:nth-child(4){animation-delay:.12s}
.workout-card:nth-child(5){animation-delay:.16s}
.workout-card:nth-child(6){animation-delay:.20s}
</style>
</head>

// ── Measurement helpers — generated from Swift profile ──
function onMeasureWkChange(wk) {
  const m = state.measurements.find(m => m.week === wk);
  document.getElementById("m-gripdom").value = m?.gripDom || '';
  document.getElementById("m-gripnon").value = m?.gripNon || '';
  document.getElementById("m-hipflex").value = m?.hipFlex || '';
  document.getElementById("m-hiprot").value = m?.hipRot || '';
  document.getElementById("m-sflex").value = m?.shoulderFlex || '';
  document.getElementById("m-srot").value = m?.shoulderRot || '';
  const notesEl = document.getElementById('m-notes'); if(notesEl) notesEl.value = m?.notes || '';
}
function saveMeasurementFromForm() {
  const wk = parseInt(document.getElementById('measure-wk-sel').value);
  saveMeasurement(wk);
}
function buildWeekOptions(currentWk, defaultWk) {
  return Array.from({length: currentWk + 1}, (_, w) => {
    const logged = state.measurements.some(m => m.week === w);
    const lbl = w === 0 ? `Baseline${logged ? ' ✓' : ''}` : `Week ${w}${logged ? ' ✓' : ''}`;
    return `<option value="${w}"${w === defaultWk ? ' selected' : ''}>${lbl}</option>`;
  }).join('');
}
function calcDefaultFormWeek(currentWk) {
  for(let w = 0; w <= currentWk; w++) {
    if(!state.measurements.some(m => m.week === w)) return w;
  }
  return currentWk;
}

}
function saveState() {
  try{ localStorage.setItem('move90v1',JSON.stringify(state)); }catch(e){}
}
function isWorkoutDone(day,i){ return !!state.completed[`${day}-${i}`]; }
function isDayFullyDone(day){
  const ws=SCHEDULE[day]; if(!ws) return false;
  return ws.every((_,i)=>isWorkoutDone(day,i));
}
function getCompletedCount(){ let n=0; for(let d=1;d<=90;d++) if(isDayFullyDone(d)) n++; return n; }
function getPhase(day){
  return PHASES.find(p=>day>=p.days[0]&&day<=p.days[1])||PHASES[0];
}

// ── RENDER TODAY ──
function renderToday(){
  const day=state.viewingDay, todayDay=getTodayDay();
  const phase=getPhase(day);
  const workouts=SCHEDULE[day];
  const pct=Math.round((day/90)*100);
  const done=getCompletedCount();

  document.getElementById('headerBadge').textContent=`Day ${todayDay}`;
  document.getElementById('headerPhase').textContent=getPhase(todayDay).label;
  document.getElementById('headerPhaseName').textContent=`${getPhase(todayDay).name} · Strength & Mobility`;
  document.getElementById('dayNavLabel').textContent=`Day ${day}`;
  document.getElementById('dayNavDate').textContent=DAY_DATES[day-1]||'';

  // Morning ritual check items
  const mk=`morning-${day}`;
  const md=state.morningDone[mk]||{jfl:false,med:false};
  const morningHtml=`
  <div class="morning-banner">
    <div class="morning-banner-title">🌿 Morning Ritual — Every Day</div>
    <div class="morning-items">
      <div class="morning-item">
        <div class="morning-item-check ${md.jfl?'done':''}" onclick="toggleMorning(${day},'jfl')">${md.jfl?'✓':''}</div>
        <div>
          <div class="morning-item-text">Joints for Life · Petra</div>
          <div class="morning-item-sub">10–15 min · Joint mobility + gentle movement · <a href="${JFL_URL}" target="_blank" style="color:var(--sage);text-decoration:none">Open Peloton →</a></div>
        </div>
      </div>
      <div class="morning-item">
        <div class="morning-item-check ${md.med?'done':''}" onclick="toggleMorning(${day},'med')">${md.med?'✓':''}</div>
        <div>
          <div class="morning-item-text">Meditation / Breathwork</div>
          <div class="morning-item-sub">5–10 min · Stress reset before the day · <a href="${pvolveUrl('Meditation')}" target="_blank" style="color:var(--sage);text-decoration:none">Pvolve Meditation →</a></div>
        </div>
      </div>
    </div>
  </div>`;

  let html = morningHtml;
  html += `
  <div class="day-hero">
    <div class="day-num-big">${day}</div>
    <div class="day-phase-info">
      <div class="day-phase-name" style="color:${phase.color}">${phase.label} · ${phase.name}</div>
      <div class="day-prog-bar"><div class="day-prog-fill" style="width:${pct}%"></div></div>
      <div class="day-prog-lbl">${done} of 90 days complete · ${pct}%</div>
    </div>
  </div>`;

  if(!workouts){
    html+=`
    <div class="rest-day-card">
      <div class="rest-icon">🌿</div>
      <h2>Rest Day</h2>
      <p>Your body rebuilds and grows stronger today. Sleep, hydrate, and nourish well. Morning ritual still applies.</p>
      <div class="rest-note">Morning ritual still counts today — Joints for Life + meditation as usual.</div>
    </div>`;
  } else {
    const mindfulItems =workouts.filter(w=>w.type==='meditation');
    const pvolveItems  =workouts.filter(w=>w.type==='pvolve');
    const cardioItems  =workouts.filter(w=>w.type==='peloton');
    const gripItems    =workouts.filter(w=>w.type==='grip');
    const recoveryItems=workouts.filter(w=>w.type==='stretch'||w.type==='mobility'||w.type==='selfcare');
    const allDone=workouts.every((_,i)=>isWorkoutDone(day,i));

    const renderSection=(label,items)=>{
      if(!items.length) return '';
      let s=`<div class="workout-section-head">${label}</div><div class="workouts-list">`;
      items.forEach(wk=>{
        const absIdx=workouts.indexOf(wk);
        const isDone=isWorkoutDone(day,absIdx);
        const colors={pvolve:'var(--sage)',peloton:'var(--lavender)',grip:'var(--gold)',mobility:'var(--teal)',selfcare:'var(--rose)',stretch:'var(--lavender)',meditation:'var(--sage)'};
        const isPvolve=wk.type==='pvolve';
        const isPeloton=wk.type==='peloton'||wk.type==='meditation';
        // Determine platform link
        let linkHtml='';
        if(isPvolve){
          const url=pvolveUrl(wk.name.includes('Women')?'Women\'s Health':wk.name.includes('Recover')?'Recover & Stretch':wk.name.includes('Movement')?'Movement Therapy':wk.name.includes('Meditation')?'Meditation':wk.name.includes('Sculpt')?'Strength & Sculpt':'Progressive Weight Training');
          linkHtml=`<a href="${url}" target="_blank" onclick="event.stopPropagation()" class="platform-link">▶ Open Pvolve</a>`;
        } else if(isPeloton && wk.classId){
          const disc=TYPE_DISCIPLINE_M[wk.type]||'cycling';
          linkHtml=`<a href="https://members.onepeloton.com/classes/${disc}?modal=classDetailsModal&classId=${wk.classId}" target="_blank" onclick="event.stopPropagation()" class="platform-link">▶ Open Peloton</a>`;
        } else if(isPeloton){
          const instructor=wk.instructor||'Olivia Amato';
          linkHtml=`<a href="${pelotonUrl(instructor,wk.mins)}" target="_blank" onclick="event.stopPropagation()" class="platform-link">▶ Open Peloton</a>`;
        }
        s+=`
        <div class="workout-card type-${wk.type} ${isDone?'done':''}" style="animation-delay:${absIdx*0.05}s">
          <div class="workout-check" onclick="toggleWorkout(${day},${absIdx})">${isDone?'✓':''}</div>
          <div class="workout-info" onclick="toggleWorkout(${day},${absIdx})">
            <div class="workout-type-label" style="color:${colors[wk.type]||'var(--sage)'}">${TYPE_LABELS[wk.type]||wk.type}</div>
            <div class="workout-name">${wk.name}</div>
            <div class="workout-meta">
              <span class="workout-dur">${wk.mins} min</span>
              <span class="workout-instructor">${wk.instructor}</span>
            </div>
            ${wk.note?`<div class="workout-note">${wk.note}</div>`:''}
            ${wk.type==='grip'?`<div class="grip-badge">🤝 Track in Progress</div>`:''}
            ${linkHtml}
          </div>
        </div>`;
      });
      s+=`</div>`;
      return s;
    };

    if(mindfulItems.length)  html+=renderSection('🧘 MINDFULNESS — PELOTON',mindfulItems);
    if(pvolveItems.length)   html+=renderSection('① PVOLVE — Strength & Sculpt',pvolveItems);
    if(cardioItems.length)   html+=renderSection('② PELOTON — Cardio',cardioItems);
    if(gripItems.length)     html+=renderSection('③ GRIP WORK — Strength Recovery',gripItems);
    if(recoveryItems.length) html+=renderSection('④ RECOVER & SELF-CARE',recoveryItems);

    html+=`<button class="complete-btn ${allDone?'all-done':''}" onclick="markDayComplete(${day})">
      ${allDone?'✓ DAY COMPLETE — WELL DONE 🌿':'MARK ALL COMPLETE'}
    </button>`;

    html+=`
    <div class="day-notes">
      <div class="day-notes-header">📝 Session Notes · Energy / Weights / How You Felt</div>
      <textarea placeholder="e.g. PWT: felt strong on rows. Grip dead hang: 25s each hand. Hip stretch felt much more open today..." oninput="saveNote(${day},this.value)">${state.dayNotes[day]||''}</textarea>
    </div>`;
  }

  const hadDrink=!!state.drinkDays[day];
  html+=`
  <div class="drink-row">
    <div class="drink-toggle${hadDrink?' drink-on':''}" onclick="toggleDrink(${day})">
      <span class="drink-toggle-label">🍷 Alcohol today?</span>
      <span class="drink-badge">${hadDrink?'YES':'NO'}</span>

  document.getElementById('todayContent').innerHTML=html;
}

function toggleWorkout(day,i){
  state.completed[`${day}-${i}`]=!state.completed[`${day}-${i}`];
  saveState(); renderToday();
  if(state.completed[`${day}-${i}`]) showToast('✓ Done!');
}
function toggleMorning(day,key){
  const mk=`morning-${day}`;
  if(!state.morningDone[mk]) state.morningDone[mk]={jfl:false,med:false};
  state.morningDone[mk][key]=!state.morningDone[mk][key];
  saveState(); renderToday();
}
function markDayComplete(day){
  const ws=SCHEDULE[day]; if(!ws) return;
  const allDone=ws.every((_,i)=>isWorkoutDone(day,i));
  ws.forEach((_,i)=>{ state.completed[`${day}-${i}`]=!allDone; });
  saveState(); renderToday();
  if(!allDone) showToast('🌿 Day complete!');
}
function saveNote(day,text){ state.dayNotes[day]=text; saveState(); }
function toggleDrink(day){
  state.drinkDays[day]=!state.drinkDays[day];
  saveState(); renderToday(); renderProgress();
}
function changeDay(d){ state.viewingDay=Math.max(1,Math.min(90,state.viewingDay+d)); saveState(); renderToday(); }

// ── RENDER SCHEDULE ──
function renderSchedule(){
  const today=getTodayDay();
  let html='';

  PHASES.forEach(phase=>{
    const [s,e]=phase.days;
    const done=Array.from({length:e-s+1},(_,i)=>s+i).filter(d=>isDayFullyDone(d)).length;
    const training=Array.from({length:e-s+1},(_,i)=>s+i).filter(d=>SCHEDULE[d]!==null).length;
    html+=`<div><div class="phase-head"><div class="phase-head-inner">
      <span class="phase-head-tag" style="background:${phase.color};color:${phase.color===('var(--gold)')||phase.color==='var(--lavender)'?'#0a0f1a':'#0a0f1a'}">${phase.label}</span>
      <span class="phase-head-title">${phase.name}</span>
      <span class="phase-head-prog">${done}/${training}</span>
    </div></div>`;

    let prevWk=Math.ceil(s/7), wkDays=[];
    for(let d=s;d<=e;d++){
      const wk=Math.ceil(d/7);
      if(wk!==prevWk&&wkDays.length){html+=renderSchedWeek(prevWk,wkDays,today);wkDays=[];prevWk=wk;}
      wkDays.push(d);
    }
    if(wkDays.length) html+=renderSchedWeek(prevWk,wkDays,today);
    html+=`</div>`;
  });
  document.getElementById('scheduleContent').innerHTML=html;
  const sv=document.querySelector('.scroll-view');
  const todayEl=document.querySelector('.sched-day-row.today-row');
  if(todayEl&&sv){ sv.scrollTop=todayEl.getBoundingClientRect().top-sv.getBoundingClientRect().top-80; }
}

function renderSchedWeek(wk,days,today){
  let html=`<div class="week-section"><div class="week-label-s">Week ${wk} · ${WK_STARTS[wk-1]||''} – ${WK_ENDS[wk-1]||''}</div>`;
  days.forEach(d=>{
    const ws=SCHEDULE[d], isRest=ws===null, isToday=d===today, isDone=isDayFullyDone(d);
    let cls='sched-day-row';
    if(isToday) cls+=' today-row';
    if(isDone) cls+=' completed-row';
    if(isRest) cls+=' rest-row';
    const icon=isDone?'✅':isToday?'▶':isRest?'—':d<today?'○':'';
    const chips=isRest
      ?`<span class="chip chip-rest">REST</span>`
      :[...new Set(ws.map(w=>w.type))].map(t=>`<span class="chip chip-${t}">${TYPE_LABELS[t]||t}</span>`).join('');
    html+=`<div class="${cls}" onclick="jumpToDay(${d})">
      <div class="sched-day-num">${d}</div>
      <div class="sched-day-info">
        <div class="sched-day-name">${DAY_DATES[d-1]||''}</div>
        <div class="sched-day-chips">${chips}</div>
      </div>
      <div class="sched-day-status">${icon}</div>
    </div>`;
    // Measurement row every Sunday
    if(d%7===0){
      const hasMeasure=state.measurements.some(m=>m.week===wk);
      html+=`<div class="measure-day-row" onclick="switchTab('progress')">
        <div class="measure-day-icon">🤝</div>
        <div class="measure-day-text">
          <div class="measure-day-title">Week ${wk} Grip & Mobility Check</div>
          <div class="measure-day-sub">Sunday evening · Both hands · Hip & shoulder ROM</div>
        </div>
        <div class="measure-day-done">${hasMeasure?'✅':'📲'}</div>
      </div>`;
    }
  });
  return html+`</div>`;
}

function jumpToDay(d){ state.viewingDay=d; saveState(); switchTab('today'); }

// ── RENDER PROGRESS ──
function renderProgress(){
  const today=getTodayDay();
  const done=getCompletedCount();
  const training=Object.values(SCHEDULE).filter(v=>v!==null).length;
  const pct=Math.round((done/training)*100);
  const streak=calcStreak(today);
  const circ=2*Math.PI*44;
  const offset=circ-(pct/100)*circ;
  const currentWk=Math.ceil(Math.min(today,90)/7);
  const drinkCount=Object.values(state.drinkDays).filter(Boolean).length;
  let afStreak=0; for(let d=today;d>=1;d--){ if(state.drinkDays[d]) break; afStreak++; }

  // Latest measurements
  const latestM=state.measurements.length?state.measurements[state.measurements.length-1]:null;
  const prevM=state.measurements.length>1?state.measurements[state.measurements.length-2]:null;

  function delta(curr,prev,key,higher=true){
    if(!curr||!prev||!curr[key]||!prev[key]) return '';
    const diff=(parseFloat(curr[key])-parseFloat(prev[key])).toFixed(1);
    if(diff==0) return '';
    const good=higher?diff>0:diff<0;
    return `<span class="h-delta ${good?'h-pos':'h-neg'}">${diff>0?'+':''}${diff}</span>`;
  }

  let html=`
  <div class="prog-hero">
    <div class="prog-top">
      <div class="prog-ring-wrap">
        <svg class="prog-ring-svg" width="96" height="96" viewBox="0 0 96 96">
          <circle class="prog-ring-bg" cx="48" cy="48" r="44"/>
          <circle class="prog-ring-fill" cx="48" cy="48" r="44" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"/>
        </svg>
        <div class="prog-ring-text"><div class="prog-pct">${pct}%</div><div class="prog-pct-label">Done</div></div>
      </div>
      <div class="prog-right">
        <div class="prog-hero-title">90-Day Progress</div>
        <div class="prog-stats-row">
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--sage)">${done}</div><div class="prog-stat-lbl">Done</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--gold)">${streak}🔥</div><div class="prog-stat-lbl">Streak</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--lavender)">${training-done}</div><div class="prog-stat-lbl">Left</div></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;">
          <div class="prog-stat"><div class="prog-stat-val" style="color:${drinkCount?'#e46450':'var(--muted)'}">${drinkCount}</div><div class="prog-stat-lbl">Drink Days</div></div>
          <div class="prog-stat"><div class="prog-stat-val" style="color:var(--sage)">${afStreak}</div><div class="prog-stat-lbl">Sober Streak</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- GRIP CARD -->
  <div class="section-head">Grip Strength</div>
  <div class="grip-card">
    <div class="grip-card-title">
      <span>🤝 Hand Grip · kg</span>
      <span style="font-size:12px;color:var(--muted);font-weight:400">Dynamometer · Both Hands</span>
    </div>
    <div class="grip-hands">
      <div class="grip-hand">
        <div class="grip-hand-label">Dominant</div>
        <div class="grip-hand-val">${latestM?.gripDom||'—'}</div>
        <div class="grip-hand-unit">kg ${delta(latestM,prevM,'gripDom',true)}</div>
      </div>
      <div class="grip-hand">
        <div class="grip-hand-label">Non-Dominant</div>
        <div class="grip-hand-val">${latestM?.gripNon||'—'}</div>
        <div class="grip-hand-unit">kg ${delta(latestM,prevM,'gripNon',true)}</div>
      </div>
    </div>
    <div class="grip-note">Measure Sunday evening after rest · Consistent time, no pre-fatigue</div>
  </div>

  <!-- ROM CARD -->
  <div class="section-head">Range of Motion</div>
  <div class="rom-card">
    <div class="rom-card-title">🔄 Hip & Shoulder Mobility</div>
    <div class="rom-grid">
      <div class="rom-item">
        <div class="rom-label">Hip Flexion</div>
        <div class="rom-val">${latestM?.hipFlex||'—'}<span class="rom-unit"> °</span></div>
        <div style="font-size:11px;color:var(--muted)">${delta(latestM,prevM,'hipFlex',true)||'—'}</div>
      </div>
      <div class="rom-item">
        <div class="rom-label">Hip Rotation</div>
        <div class="rom-val">${latestM?.hipRot||'—'}<span class="rom-unit"> °</span></div>
        <div style="font-size:11px;color:var(--muted)">${delta(latestM,prevM,'hipRot',true)||'—'}</div>
      </div>
      <div class="rom-item">
        <div class="rom-label">Shoulder Flex</div>
        <div class="rom-val">${latestM?.shoulderFlex||'—'}<span class="rom-unit"> °</span></div>
        <div style="font-size:11px;color:var(--muted)">${delta(latestM,prevM,'shoulderFlex',true)||'—'}</div>
      </div>
      <div class="rom-item">
        <div class="rom-label">Shoulder Rot</div>
        <div class="rom-val">${latestM?.shoulderRot||'—'}<span class="rom-unit"> °</span></div>
        <div style="font-size:11px;color:var(--muted)">${delta(latestM,prevM,'shoulderRot',true)||'—'}</div>
      </div>
    </div>
  </div>

  <!-- HEATMAP -->
  <div class="section-head">Training Map</div>
  <div class="heatmap-labels">${Array.from({length:13},(_,i)=>`<div class="heatmap-wk-lbl">W${i+1}</div>`).join('')}</div>
  <div class="heatmap-row">`;

  for(let wk=1;wk<=13;wk++){
    html+=`<div class="heatmap-week">`;
    for(let wd=0;wd<7;wd++){
      const d=(wk-1)*7+wd+1;
      if(d>90){html+=`<div class="heatmap-cell" style="opacity:.2"></div>`;continue;}
      const isDone2=isDayFullyDone(d),isRest=SCHEDULE[d]===null,isToday=d===today,drank=!!state.drinkDays[d];
      html+=`<div class="heatmap-cell${isDone2?' done-cell':''}${isRest?' rest-cell':''}${isToday?' today-cell':''}${drank?' drank-cell':''}" title="Day ${d}${drank?' · 🍷':''}"></div>`;
    }
    html+=`</div>`;
  }
  html+=`</div>`;

  // Measurement form — week selector (logic provided by GEN:SHARED_JS)
  const defaultFormWk=calcDefaultFormWeek(currentWk);
  const wkOptions=buildWeekOptions(currentWk,defaultFormWk);

  html+=`
  <div class="section-head">Weekly Measurements</div>
  <div class="measure-form">
    <div class="measure-form-title">
      <span>Log Measurements</span>
      <select id="measure-wk-sel" class="measure-week-select" onchange="onMeasureWkChange(parseInt(this.value))">${wkOptions}</select>
    </div>
    <div class="measure-grid">
      <div class="measure-field">
        <label>Dominant Hand <span class="measure-unit">kg</span></label>
        <input type="number" id="m-gripdom" placeholder="—" inputmode="decimal" step="0.1">
      </div>
      <div class="measure-field">
        <label>Non-Dominant <span class="measure-unit">kg</span></label>
        <input type="number" id="m-gripnon" placeholder="—" inputmode="decimal" step="0.1">
      </div>

      </div>
      <div class="measure-field">
        <label>Shoulder Flex <span class="measure-unit">°</span></label>
        <input type="number" id="m-sflex" placeholder="—" inputmode="decimal" step="1">
      </div>
      <div class="measure-field">
        <label>Shoulder Rot <span class="measure-unit">°</span></label>
        <input type="number" id="m-srot" placeholder="—" inputmode="decimal" step="1">
      </div>
      <div class="measure-notes-field">
        <label style="display:block;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;font-weight:600">Notes</label>
        <textarea id="m-notes" placeholder="How do your joints feel? Any areas of improvement or tightness?"></textarea>
      </div>
    </div>
    <button class="measure-save-btn" onclick="saveMeasurementFromForm()">SAVE MEASUREMENTS</button>
  </div>`;

  // History
  if(state.measurements.length){
    html+=`<div class="section-head">Measurement History</div>
    <div class="history-card">
    <div class="history-row hdr"><div>Wk</div><div>Dom</div><div>Non</div><div>Hip</div><div>Shld</div></div>`;
    state.measurements.forEach((m,i)=>{
      const p=state.measurements[i-1];
      html+=`<div class="history-row">
        <div class="history-wk">${m.week===0?'BASE':'W'+m.week}</div>
        <div class="history-val">${m.gripDom||'—'} ${delta(m,p,'gripDom',true)}</div>
        <div class="history-val">${m.gripNon||'—'} ${delta(m,p,'gripNon',true)}</div>
        <div class="history-val">${m.hipFlex||'—'}° ${delta(m,p,'hipFlex',true)}</div>
        <div class="history-val">${m.shoulderFlex||'—'}° ${delta(m,p,'shoulderFlex',true)}</div>
      </div>`;
    });
    html+=`</div>`;
  } else {
    html+=`<div class="section-head">Measurement History</div>
    <div class="history-card"><div class="empty-history">Log your Week 0 baseline to start tracking progress 🌿</div></div>`;
  }

  document.getElementById('progressContent').innerHTML=html;
  // Pre-populate form with existing data for the default week
  onMeasureWkChange(defaultFormWk);
}

function calcStreak(today){
  let s=0;
  for(let d=Math.min(today,90);d>=1;d--){
    if(SCHEDULE[d]===null) continue;
    if(isDayFullyDone(d)) s++;
    else if(d<today) break;
  }
  return s;
}

function saveMeasurement(forceWk){
  const gripDom=document.getElementById('m-gripdom').value;
  const gripNon=document.getElementById('m-gripnon').value;
  const hipFlex=document.getElementById('m-hipflex').value;
  const hipRot=document.getElementById('m-hiprot').value;
  const shoulderFlex=document.getElementById('m-sflex').value;
  const shoulderRot=document.getElementById('m-srot').value;
  const notes=document.getElementById('m-notes').value;
  if(!gripDom&&!gripNon&&!hipFlex&&!shoulderFlex){showToast('Enter at least one measurement','var(--rose)');return;}
  const wk=forceWk!==undefined?forceWk:Math.ceil(Math.min(getTodayDay(),90)/7);
  const entry={week:wk,date:new Date().toLocaleDateString(),gripDom,gripNon,hipFlex,hipRot,shoulderFlex,shoulderRot,notes};
  const idx=state.measurements.findIndex(m=>m.week===wk);
  if(idx>=0) state.measurements[idx]=entry;
  else { state.measurements.push(entry); state.measurements.sort((a,b)=>a.week-b.week); }
  saveState(); renderProgress();
  showToast(wk===0?'🌿 Baseline saved!':'📊 Week '+wk+' saved!');
}

// ── TABS ──
function switchTab(tab){
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.querySelector('.scroll-view').scrollTop=0;
  if(tab==='today'){ state.viewingDay=getTodayDay(); saveState(); renderToday(); }
  else if(tab==='schedule') renderSchedule();
  else renderProgress();
}

let toastT;
function showToast(msg,bg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.style.background=bg||'var(--sage)';
  el.style.color=bg?'#fff':'#0a0f1a';
  el.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>el.classList.remove('show'),2200);
}
